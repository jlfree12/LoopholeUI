name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-macos-app:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Repair published source snapshot
        run: python3 Scripts/repair-github-build-sources.py

      - name: Build LoopholeUI
        run: |
          xcodebuild \
            -project LoopholeUI.xcodeproj \
            -scheme LoopholeUI \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Locate app bundle
        id: locate
        run: |
          APP_PATH="$(find "$GITHUB_WORKSPACE/DerivedData" -type d -name 'LoopholeUI.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "Could not find LoopholeUI.app after build."
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Zip app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent "${{ steps.locate.outputs.app_path }}" LoopholeUI.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoopholeUI-macOS-app
          path: LoopholeUI.app.zip
          if-no-files-found: error
